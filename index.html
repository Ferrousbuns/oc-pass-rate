<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OC Pass Rates</title>
    <meta name="description" content="View, search, and analyze historical Torn Organized Crime pass rates.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>

<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container glassmorphism">
        <header>
            <h1>OC Pass Rates</h1>
            <p>View, search, and analyze Organized Crime member pass rates.</p>
        </header>

        <div class="oc-selector-container">
            <label for="ocSelect" class="oc-selector-label">Select Organized Crime:</label>
            <div class="select-wrapper">
                <select id="ocSelect" class="oc-select">
                    <!-- Options will be injected here by JS -->
                </select>
                <div class="select-arrow">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </div>
            </div>
        </div>

        <div class="controls" style="justify-content: flex-end;">
            <div class="filter-controls-wrapper">
                <button class="btn btn-secondary" id="hideZerosBtn" aria-pressed="false">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        style="margin-right: 6px;">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                        <line x1="1" y1="1" x2="23" y2="23" class="strike-line"></line>
                    </svg>
                    Hide 0s
                </button>
                <div class="columns-dropdown-wrapper">
                    <button class="btn btn-primary" id="columnsBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="margin-right: 6px;">
                            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                            <polyline points="2 17 12 22 22 17"></polyline>
                            <polyline points="2 12 12 17 22 12"></polyline>
                        </svg>
                        Columns
                    </button>
                    <div class="columns-menu hidden" id="columnsMenu">
                        <div class="columns-menu-header">Show/Hide Columns</div>
                        <div id="columnsList" class="columns-list"></div>
                    </div>
                </div>
                <div class="search-wrapper" id="searchWrapper">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search any column..." class="search-input" />
                </div>
            </div>
        </div>

        <div class="table-container fade-in hidden" id="tableContainer">
            <div class="table-stats" id="tableStats"></div>
            <div class="table-wrapper">
                <table id="csvTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="empty-state" id="emptyState">
            <svg id="loadingSpinner" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                class="empty-icon spin">
                <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
            </svg>
            <h2 id="loadingText">Loading Data...</h2>
            <p id="loadingSubtext">Fetching OC data. This might take a moment.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
